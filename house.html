<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Lily's House</title>
    <link rel="stylesheet" href="house.css">
    <link rel="icon" href="Myicon.ico">
  </head>
  <body>
    <img src="favicon-32x32.png">
    <main>
      <article>
      <h1>Lily's House</h1>
      </article>
      
      <div class="house-container">
        
      <div class="cloud-1"></div>
      <div class="cloud-2"></div>
      <div class="cloud-3"></div>
      <div class="cloud-4"></div>
      <div class="cloud-5"></div>
      
      <div class="house">
        <div class="house-1"></div>
      </div>
      
        <div class="roof">
        </div>
        
        <div class="chimney">
          <div class="small-chimney"></div>
          <div class="smoke-1"></div>
          <div class="smoke-2"></div>
          <div class="smoke-3"></div>
          <div class="smoke-4"></div>
        </div>
        
        <div class="floor"></div>
        
        <div class="door">
          <div class="door-1"></div>
          <div class="keyhole"></div>
        </div>
        
        <div class="window">
          <div class="small-1"></div>
          <div class="small-2"></div>
          <div class="window-boxes">
            <div class="circle"></div>
            <div class="circle-1"></div>
            <div class="circle-2"></div>
            <div class="circle-3"></div>
          </div>
        </div>
        
        <div class="window-1">
          <div class="small-3"></div>
          <div class="small-4"></div>
          <div class="window-boxes-1">
           <div class="circle-4"></div>
           <div class="circle-5"></div>
           <div class="circle-6"></div>
           <div class="circle-7"></div>
          </div>
        </div>
        
        <div class="step"></div>
        
        <div class="ground"></div>
        
        <div class="pathway-1"></div>
        <div class="pathway-2"></div>
        <div class="pathway-3"></div>
        
       <div class="sticky-tree">
         
         <div class="triangle-1">
           <div class="red"></div>
         </div>
         
         <div class="triangle-2">
           <div class="red-1"></div>
           <div class="red-2"></div>
         </div>
         
         <div class="triangle-3">
          <div class="red-3"></div>
          <div class="red-4"></div>
          <div class="red-5"></div>
         </div>
         
         <div class="oval-earth"></div>
       </div>
       
       <div class="green-grass"></div>
       <div class="green-grass-1"></div>
       <div class="green-grass-2"></div>
       <div class="green-grass-3"></div>
       <div class="flower-hedge"></div>
      </div>
    </main>
  </body>
</html>
